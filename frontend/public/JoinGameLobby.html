<script>
    async function refreshRooms() {
        const container = document.getElementById('rooms-container');
        container.innerHTML = `
            <div class="col-span-full py-12 text-center text-on-surface-variant opacity-50">
                <span class="material-symbols-outlined animate-spin text-4xl mb-2">sync</span>
                <p class="text-xs font-bold uppercase tracking-widest">Updating Room List...</p>
            </div>
        `;
        
        try {
            const res = await fetch('/api/games/rooms');
            const rooms = await res.json();
            
            if (rooms.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-12 flex flex-col items-center justify-center text-center space-y-4 border-2 border-dashed border-outline-variant/30 rounded-xl bg-surface-container-low">
                        <span class="material-symbols-outlined text-4xl text-outline-variant">tab_unselected</span>
                        <div>
                            <p class="font-bold text-on-surface">No active rooms found</p>
                            <p class="text-xs text-on-surface-variant mt-1">Be the first to create one!</p>
                        </div>
                        <button onclick="window.location.href='/CreateGameLobby.html'" class="text-xs bg-primary text-white px-6 py-2 rounded-full font-bold shadow-sm hover:scale-105 transition-all">Create Room</button>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = rooms.map(room => `
                <div onclick="selectRoom('${room.roomCode}')" class="group bg-surface-container-lowest p-6 rounded-xl hover:shadow-[0px_10px_30px_rgba(139,92,246,0.12)] transition-all cursor-pointer border border-transparent hover:border-primary/20 scale-100 hover:scale-[1.02]">
                    <div class="flex justify-between items-start mb-6">
                        <div class="bg-secondary-fixed text-on-secondary-fixed-variant px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">Public Match</div>
                        <div class="flex items-center gap-1 text-on-surface-variant">
                            <span class="material-symbols-outlined text-sm">group</span>
                            <span class="text-xs font-bold">${room.playerCount}/2</span>
                        </div>
                    </div>
                    <h3 class="font-bold text-lg text-on-surface mb-1">Room ${room.roomCode}</h3>
                    <p class="text-on-surface-variant text-sm mb-6">Hosted by <span class="text-primary font-semibold">${room.host}</span></p>
                    <div class="flex items-center justify-between">
                         <span class="text-[9px] text-outline font-bold uppercase tracking-tight">${new Date(room.createdAt).toLocaleTimeString()}</span>
                         <span class="material-symbols-outlined text-primary group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </div>
                </div>
            `).join('');
            
        } catch (err) {
            console.error(err);
            container.innerHTML = `<p class="col-span-full text-center text-error font-bold p-8">Failed to fetch rooms.</p>`;
        }
    }

    function selectRoom(code) {
        document.getElementById('room-code-input').value = code;
        document.getElementById('join-btn').scrollIntoView({ behavior: 'smooth' });
    }

    document.addEventListener('DOMContentLoaded', () => {
        refreshRooms();
        const joinBtn = document.getElementById('join-btn');
        const codeInput = document.getElementById('room-code-input');
        
        if (window.MultiplayerClient && joinBtn && codeInput) {
            const client = new window.MultiplayerClient("GameLobby", (players) => {
                const opp = players.find(p => p.id !== client.socket.id);
                if (opp) {
                    joinBtn.innerHTML = `<span>Joined Lobby! Waiting for host...</span>`;
                    joinBtn.classList.replace('from-primary-container', 'from-green-500');
                    joinBtn.classList.replace('to-primary', 'to-green-600');
                }
            });

            joinBtn.addEventListener('click', () => {
                const code = codeInput.value.trim().toUpperCase();
                if (code.length === 6) {
                    joinBtn.innerHTML = `<span>Connecting... <i class="material-symbols-outlined animate-spin align-middle text-sm">sync</i></span>`;
                    client.joinRoom(code);
                } else {
                    alert("Please enter a valid 6-character room code.");
                }
            });
        }
    });
</script>
