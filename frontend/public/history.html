<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Smart Hub | History</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script type="module" src="/js/script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#8b5cf6",
                        "surface": "#f8fafc",
                        "on-surface": "#0f172a",
                        "on-surface-variant": "#475569",
                        "surface-container-low": "#f1f5f9",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e2e8f0",
                        "surface-container": "#f1f5f9",
                        "secondary-fixed": "#ede9fe",
                        "on-secondary-fixed": "#4c1d95",
                        "primary-fixed-dim": "#c4b5fd",
                        "primary-container": "#7c3aed",
                        "on-primary": "#ffffff",
                    },
                },
            },
        }
    </script>
<script type="module" src="/js/script.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-family: 'Material Symbols Outlined';  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .history-card:hover { transform: translateY(-4px); box-shadow: 0 30px 60px rgba(139, 92, 246, 0.08); }
        .glass-ui { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(139, 92, 246, 0.1); }
    </style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary/20 transition-colors duration-300">
    <nav class="fixed top-0 w-full z-50 bg-slate-50/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-[0px_20px_40px_rgba(139,92,246,0.06)] h-20 flex items-center px-12 tracking-tight">
        <div class="max-w-[1440px] mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-8">
                <span id="nav-site-logo-text" class="text-xl font-bold tracking-tighter text-slate-900 text-primary uppercase">Smart Hub</span>
                <div class="hidden md:flex items-center gap-6">
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/index.html">Home</a>
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/calculators.html">Tools</a>
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/GameLobby.html">Games</a>
                    <a class="text-primary font-semibold border-b-2 border-primary pb-1" href="/history.html">History</a>
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/about.html">About</a>
                </div>
            </div>
            <div class="flex items-center gap-4" id="auth-actions">
                <!-- Populated by script.js -->
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-12 max-w-[1200px] mx-auto min-h-screen">
        <header class="mb-16 flex flex-col md:flex-row md:items-end justify-between gap-8">
            <div>
                <nav class="flex items-center gap-2 text-sm text-on-surface-variant mb-4 font-medium tracking-wide">
                    <span>DASHBOARD</span>
                    <span class="material-symbols-outlined text-xs">chevron_right</span>
                    <span class="text-primary uppercase tracking-widest text-[10px] font-bold">Calculation History</span>
                </nav>
                <h1 class="text-6xl font-extrabold tracking-tighter text-on-surface mb-2">History.</h1>
                <p class="text-on-surface-variant text-lg">A record of all your past calculations and results.</p>
            </div>
            <div class="flex gap-4">
                <div class="flex bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
                    <button onclick="exportHistoryCSV()" class="px-6 py-4 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-primary hover:bg-primary/5 transition-all">
                        <span class="material-symbols-outlined text-sm">download</span> CSV
                    </button>
                    <div class="w-px h-8 bg-slate-100 my-auto"></div>
                    <button onclick="exportHistoryPDF()" class="px-6 py-4 flex items-center gap-2 text-[10px] font-black uppercase tracking-widest text-primary hover:bg-primary/5 transition-all">
                        <span class="material-symbols-outlined text-sm">picture_as_pdf</span> PDF
                    </button>
                </div>
                <button id="clearBtn" class="bg-rose-50 text-rose-600 px-8 py-4 rounded-[2rem] font-bold text-xs tracking-[0.2em] hover:bg-rose-100 transition-all flex items-center gap-3 uppercase border border-rose-100">
                    <span class="material-symbols-outlined text-sm">delete_sweep</span> Clear
                </button>
            </div>
        </header>

        <!-- Search & Filter Cluster -->
        <div class="glass-ui p-6 rounded-[2.5rem] shadow-2xl mb-12 flex flex-col md:flex-row gap-6 items-center">
            <div class="relative flex-1 w-full">
                <span class="material-symbols-outlined absolute left-6 top-1/2 -translate-y-1/2 text-primary opacity-50">search</span>
                <input id="searchInput" type="text" placeholder="Search for a calculation..." class="w-full bg-surface-container-low border-none rounded-2xl pl-16 pr-8 py-5 focus:ring-2 focus:ring-primary outline-none transition-all text-sm font-bold placeholder:text-slate-400 shadow-inner">
            </div>
            <div class="flex gap-4 w-full md:w-auto">
                <select id="filterSelect" class="flex-1 md:w-48 bg-surface-container-low border-none rounded-2xl px-8 py-5 text-xs font-black uppercase tracking-widest text-on-surface-variant focus:ring-2 focus:ring-primary transition-all shadow-inner">
                    <option value="all">All Time</option>
                    <option value="today">Today Only</option>
                    <option value="week">Past 7 Days</option>
                </select>
                <div class="bg-primary/5 text-primary p-5 rounded-2xl border border-primary/10 flex items-center justify-center">
                    <span class="material-symbols-outlined font-black">sync</span>
                </div>
            </div>
        </div>

        <!-- Registry List -->
        <div id="historyContainer" class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <!-- Loading State -->
            <div class="col-span-full py-40 text-center space-y-4">
                <div class="w-20 h-20 bg-primary/10 rounded-full border-4 border-dashed border-primary animate-spin mx-auto"></div>
                <p class="text-primary font-black tracking-[0.3em] uppercase text-[10px] animate-pulse">Loading history...</p>
            </div>
        </div>
    </main>

    <!-- Detail Overlay -->
    <div id="modalBackdrop" class="fixed inset-0 bg-slate-950/80 backdrop-blur-xl z-[100] hidden flex items-center justify-center p-8 opacity-0 transition-opacity duration-300">
        <div class="bg-surface-container-lowest rounded-[3rem] max-w-2xl w-full p-12 shadow-[0px_80px_160px_rgba(0,0,0,0.5)] relative transform scale-95 transition-transform duration-300 overflow-hidden" id="modalContent">
            <div class="absolute -right-20 -top-20 w-64 h-64 bg-primary/10 rounded-full blur-3xl pointer-events-none"></div>
            <button onclick="closeModal()" class="absolute top-8 right-8 w-12 h-12 rounded-2xl bg-slate-100 hover:bg-slate-200 hover:scale-110 flex items-center justify-center transition-all z-10">
                <span class="material-symbols-outlined">close</span>
            </button>
            <div id="modalBody" class="relative z-10"></div>
        </div>
    </div>

    <script>
        let currentHistory = [];

        async function fetchHistory() {
            const token = localStorage.getItem('token');
            const local = JSON.parse(localStorage.getItem('calc_history') || '[]');
            
            let remote = [];
            if (token) {
                try {
                    const res = await fetch('/api/history', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) remote = await res.json();
                } catch (e) { console.error('Remote fetch failed', e); }
            }

            const map = new Map();
            local.forEach(item => map.set(item.id || item.timestamp, item));
            remote.forEach(item => {
                const id = item.id || item.timestamp || item._id;
                map.set(id, {
                    ...item,
                    id: id,
                    name: item.toolName || item.name,
                    date: item.date || new Date(item.timestamp).toLocaleString()
                });
            });

            currentHistory = Array.from(map.values()).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyContainer');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('filterSelect').value;
            const now = Date.now();

            const filtered = currentHistory.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(search) || (item.details || "").toLowerCase().includes(search);
                let matchesFilter = true;
                if (filter === 'today') matchesFilter = (now - item.timestamp) < 86400000;
                if (filter === 'week') matchesFilter = (now - item.timestamp) < 604800000;
                return matchesSearch && matchesFilter;
            });

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-40 text-center opacity-20">
                        <span class="material-symbols-outlined text-9xl mb-6">history_toggle_off</span>
                        <p class="font-black tracking-[0.5em] text-sm uppercase">No history found</p>
                    </div>`;
                return;
            }

            container.innerHTML = filtered.map((item, idx) => `
                <div onclick="showDetails(${idx})" class="history-card bg-surface-container-lowest p-8 rounded-[2.5rem] border border-slate-100 flex flex-col justify-between cursor-pointer transition-all group relative overflow-hidden">
                    <div class="absolute right-0 top-0 p-8 opacity-0 group-hover:opacity-10 transition-opacity">
                        <span class="material-symbols-outlined text-7xl text-primary">analytics</span>
                    </div>
                    <div class="relative z-10 flex items-center gap-6 mb-8">
                        <div class="w-16 h-16 rounded-2xl bg-primary shadow-lg shadow-primary/20 flex items-center justify-center text-white scale-90 group-hover:scale-100 transition-transform">
                            <span class="material-symbols-outlined text-3xl">bolt</span>
                        </div>
                        <div class="min-w-0 flex-1">
                            <span class="text-[9px] font-black text-primary uppercase tracking-[0.3em] mb-1 block">${item.date.split(',')[0]}</span>
                            <h3 class="font-black tracking-tighter text-2xl truncate pr-4 text-on-surface">${item.name}</h3>
                        </div>
                    </div>
                    <div class="px-2 py-4 bg-slate-50 rounded-2xl mb-6 truncate border border-slate-100 text-[10px] font-bold text-on-surface-variant uppercase tracking-widest text-center">
                        ${item.details || 'Calculation details'}
                    </div>
                    <div class="flex items-center justify-between pt-4 border-t border-slate-50">
                        <span class="text-[10px] font-black uppercase tracking-widest text-slate-400">${new Date(item.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                        <span class="material-symbols-outlined text-slate-300 group-hover:translate-x-1 group-hover:text-primary transition-all">north_east</span>
                    </div>
                </div>
            `).join('');
        }

        function showDetails(idx) {
            const item = currentHistory[idx];
            const body = document.getElementById('modalBody');
            const backdrop = document.getElementById('modalBackdrop');
            const content = document.getElementById('modalContent');
            
            let inputsHtml = (item.inputs || []).map(i => `
                <div class="flex justify-between py-4 border-b border-slate-50 group">
                    <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] group-hover:text-primary transition-colors">${i.label}</span>
                    <span class="text-sm font-black text-on-surface">${i.val}</span>
                </div>
            `).join('');

            let resultsHtml = (item.results || []).map(r => `
                <div class="flex justify-between py-6 ${r.highlight ? 'bg-primary/5 px-6 rounded-2xl border border-primary/10' : ''} items-center">
                    <span class="text-[10px] font-black ${r.highlight ? 'text-primary' : 'text-slate-500'} uppercase tracking-[0.3em]">${r.label}</span>
                    <span class="text-2xl font-black ${r.highlight ? 'text-primary' : 'text-on-surface'} tracking-tighter">${r.val}</span>
                </div>
            `).join('');

            body.innerHTML = `
                <div class="mb-10 text-center">
                    <div class="w-20 h-20 bg-primary/10 rounded-3xl flex items-center justify-center text-primary mx-auto mb-6">
                        <span class="material-symbols-outlined text-4xl">history</span>
                    </div>
                    <span class="text-[10px] font-black text-primary uppercase tracking-[0.4em] block mb-2">Calculation Details</span>
                    <h2 class="text-4xl font-black tracking-tighter">${item.name}</h2>
                    <p class="text-[10px] font-bold text-slate-400 mt-4 uppercase tracking-[0.3em] bg-slate-50 w-fit mx-auto px-4 py-2 rounded-full border border-slate-100">${item.date}</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-12">
                    <div class="space-y-6">
                        <h4 class="text-[10px] font-black text-primary uppercase tracking-widest flex items-center gap-2">
                             <span class="w-1 h-3 bg-primary rounded-full"></span> Your Inputs
                        </h4>
                        <div class="space-y-1">${inputsHtml || '<p class="text-xs opacity-50">None</p>'}</div>
                    </div>
                    <div class="space-y-6">
                        <h4 class="text-[10px] font-black text-primary uppercase tracking-widest flex items-center gap-2">
                             <span class="w-1 h-3 bg-primary rounded-full"></span> The Results
                        </h4>
                        <div class="space-y-2">${resultsHtml}</div>
                    </div>
                </div>
                <button onclick="window.location.reload()" class="w-full bg-primary text-white py-6 rounded-3xl font-black text-xs uppercase tracking-[0.4em] mt-12 shadow-2xl shadow-primary/30 hover:scale-[1.01] transition-all flex items-center justify-center gap-3">
                    <span class="material-symbols-outlined text-sm">refresh</span> Refresh History
                </button>
            `;

            backdrop.classList.remove('hidden');
            setTimeout(() => {
                backdrop.classList.replace('opacity-0', 'opacity-100');
                content.classList.replace('scale-95', 'scale-100');
            }, 10);
        }

        function closeModal() {
            const backdrop = document.getElementById('modalBackdrop');
            const content = document.getElementById('modalContent');
            backdrop.classList.replace('opacity-100', 'opacity-0');
            content.classList.replace('scale-100', 'scale-95');
            setTimeout(() => backdrop.classList.add('hidden'), 300);
        }

        async function exportHistoryCSV() {
            if (currentHistory.length === 0) return alert('No history to export.');
            
            let csv = 'Date,Tool,Detail,Inputs,Results\n';
            currentHistory.forEach(item => {
                const inputs = (item.inputs || []).map(i => `${i.label}:${i.val}`).join(' | ');
                const results = (item.results || []).map(r => `${r.label}:${r.val}`).join(' | ');
                csv += `"${item.date}","${item.name}","${(item.details || '').replace(/"/g, '""')}","${inputs.replace(/"/g, '""')}","${results.replace(/"/g, '""')}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.setAttribute('download', `smarthub_history_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function exportHistoryPDF() {
            // Simplified PDF via Print
            const content = document.getElementById('historyContainer').innerHTML;
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>Smart Hub | Calculation Export</title>
                    <script src="https://cdn.tailwindcss.com"><\/script>
                    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
                    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; padding: 40px; }</style>
                </head>
                <body>
                    <div class="mb-10 pb-6 border-b-4 border-indigo-600">
                        <h1 class="text-4xl font-black uppercase tracking-tighter text-indigo-900">Registry Report.</h1>
                        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mt-2">Exported on ${new Date().toLocaleString()}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-8">${content}</div>
                </body>
                </html>
            `);
            win.document.close();
            setTimeout(() => {
                win.print();
                // win.close(); 
            }, 1000);
        }

        document.getElementById('searchInput').oninput = renderHistory;
        document.getElementById('filterSelect').onchange = renderHistory;
        document.getElementById('clearBtn').onclick = async () => {
            if (!confirm('Are you sure you want to clear your calculation history? This cannot be undone.')) return;
            localStorage.removeItem('calc_history');
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    await fetch('/api/history', { 
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                } catch(e) {}
            }
            fetchHistory();
        };

        window.onclick = function(e) { if (e.target.id == 'modalBackdrop') closeModal(); }
        document.addEventListener('DOMContentLoaded', fetchHistory);
    </script>
    <script type="module" src="/js/script.js"></script>
    <script src="/js/pwa.js"></script>
</body>
</html>
