<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMART HUB | URL Encoder/Decoder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
    <div class="dashboard-layout" id="dashboard-wrapper">
        <div class="overlay" id="mobile-overlay"></div>
        <div id="sidebar-placeholder"></div>
        
        <main class="main-content">
            <div id="header-placeholder"></div>
            
            <div class="page-body">
                <section class="container fade-in">
                    <div class="cat-card stagger-1">
                        <div class="calculator-header">
                            <h2><i class="fa-solid fa-link" style="color: var(--primary-color);"></i> URL Encoder/Decoder</h2>
                            <p>Encode text for use in URLs or decode URL-encoded strings.</p>
                        </div>
                        
                        <div class="tabs" style="display:flex; gap:10px; margin-bottom:15px;">
                            <button class="btn-tab active" id="tab-encode" onclick="switchTab('encode')">Encode</button>
                            <button class="btn-tab" id="tab-decode" onclick="switchTab('decode')">Decode</button>
                        </div>

                        <div class="sub-cat-list">
                            <div class="sub-link" style="flex-direction: column; align-items: flex-start;">
                                <span id="input-label">Text to Encode</span>
                                <textarea id="input-text" class="form-control" rows="4" placeholder="Enter text..." style="width: 100%; margin-top: 10px;"></textarea>
                            </div>
                            <button id="calc-btn" class="btn-calc">Encode URL</button>
                        </div>
                    </div>

                    <div id="results" class="cat-card stagger-2" style="display: none; margin-top: 20px;">
                        <h3><i class="fas fa-code"></i> Result</h3>
                        <div class="sub-cat-list">
                            <div class="sub-link" style="flex-direction: column; align-items: flex-start;">
                                <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:5px;">
                                    <span>Output</span>
                                    <button id="copy-btn" style="background:none; border:none; color:var(--primary-color); cursor:pointer; font-size: 0.9rem;"><i class="far fa-copy"></i> Copy</button>
                                </div>
                                <code id="output-text" style="display:block; width:100%; padding:15px; background:rgba(0,0,0,0.2); border-radius:8px; word-break:break-all; font-family:monospace; color: var(--accent-color);"></code>
                            </div>
                        </div>
                        <div class="button-group" style="margin-top: 15px;">
                            <button id="save-btn" class="btn-save"><i class="fa-solid fa-save"></i> Save to History</button>
                        </div>
                    </div>
                </section>
                <div id="footer-placeholder"></div>
            </div>
        </main>
    </div>

    <script>
        window.FRONTEND_ROOT = "/"; 
        window.COMPONENT_ROOT = "/components/"; 
    </script>
    <script src="/js/component-loader.js"></script>
    <script src="/js/calc-utils.js"></script>
    <script type="module" src="/js/script.js"></script>
    <script>
        let currentMode = 'encode';

        window.switchTab = function(mode) {
            currentMode = mode;
            document.getElementById('tab-encode').classList.toggle('active', mode === 'encode');
            document.getElementById('tab-decode').classList.toggle('active', mode === 'decode');
            
            document.getElementById('input-label').innerText = mode === 'encode' ? 'Text to Encode' : 'URL to Decode';
            document.getElementById('calc-btn').innerText = mode === 'encode' ? 'Encode URL' : 'Decode URL';
            document.getElementById('input-text').placeholder = mode === 'encode' ? 'Enter text...' : 'Enter URL encoded string...';
            document.getElementById('results').style.display = 'none';
        };

        document.getElementById('calc-btn').addEventListener('click', () => {
            const input = document.getElementById('input-text').value;
            if(!input) return alert("Please enter some input.");
            
            let output = '';
            try {
                output = currentMode === 'encode' ? encodeURIComponent(input) : decodeURIComponent(input);
            } catch(e) {
                return alert("Invalid input for " + currentMode);
            }
            
            const resCard = document.getElementById('results');
            const outputEl = document.getElementById('output-text');
            
            outputEl.innerText = output;
            resCard.style.display = 'block';
            
            // Setup save button
            const saveBtn = document.getElementById('save-btn');
            const newBtn = saveBtn.cloneNode(true);
            saveBtn.parentNode.replaceChild(newBtn, saveBtn);
            
            newBtn.addEventListener('click', () => {
                const rows = [{ label: "Result", val: output, highlight: true }];
                const inputs = [{ label: "Input", val: input.substring(0, 50) + (input.length>50?"...":"") }];
                const toolName = currentMode === 'encode' ? "URL Encoder" : "URL Decoder";
                const ok = window.saveCalcToHistory(toolName, inputs, rows);
                if(ok) {
                    const orig = newBtn.innerHTML;
                    newBtn.innerHTML = '<i class="fas fa-check"></i> Saved!';
                    newBtn.style.background = '#10b981';
                    setTimeout(() => { newBtn.innerHTML = orig; newBtn.style.background = ''; }, 2000);
                }
            });
        });

        document.getElementById('copy-btn').addEventListener('click', () => {
            const text = document.getElementById('output-text').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.getElementById('copy-btn');
                const orig = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied';
                setTimeout(() => btn.innerHTML = orig, 2000);
            });
        });
    </script>
    <style>
        .btn-tab {
            flex: 1;
            padding: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .btn-tab.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }
    </style>
</body>
</html>
