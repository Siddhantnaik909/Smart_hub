<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Smart Hub | Connect 4</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "var(--primary-color, #8b5cf6)",
                        "surface": "#f8fafc",
                        "on-surface": "#0f172a",
                        "on-surface-variant": "#475569",
                        "surface-container-low": "#f1f5f9",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-high": "#e2e8f0",
                        "surface-container": "#f1f5f9",
                        "secondary-fixed": "#ede9fe",
                        "on-secondary-fixed": "#4c1d95",
                        "primary-fixed-dim": "#c4b5fd",
                        "primary-container": "#7c3aed",
                        "on-primary": "#ffffff",
                    },
                },
            },
        }
    </script>
    <style>
        :root { --primary-color: #8b5cf6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .material-symbols-outlined { font-family: 'Material Symbols Outlined'; font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .token-drop { animation: drop-in 0.5s cubic-bezier(0.6, 0.04, 0.98, 0.33) forwards; }
        @keyframes drop-in { 0% { transform: translateY(-500px); opacity: 0; } 80% { transform: translateY(10px); opacity: 1; } 100% { transform: translateY(0); } }
        .win-glow { animation: pulse-border 1.5s infinite; }
        @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.5); } 50% { box-shadow: 0 0 0 6px rgba(139, 92, 246, 0.8); } }
    </style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary/20 transition-colors duration-300">
    <nav class="fixed top-0 w-full z-50 bg-slate-50/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-[0px_20px_40px_rgba(139,92,246,0.06)] h-20 flex items-center px-12 tracking-tight">
        <div class="max-w-[1440px] mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-8">
                <span id="nav-site-logo-text" class="text-xl font-bold tracking-tighter text-slate-900 text-primary uppercase">Smart Hub</span>
                <div class="hidden md:flex items-center gap-6">
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/index.html">Home</a>
                    <a class="text-primary font-semibold border-b-2 border-primary pb-1" href="/calculators.html">Tools</a>
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/GameLobby.html">Games</a>
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/history.html">History</a>
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/about.html">About</a>
                </div>
            </div>
            <div class="flex items-center gap-4" id="auth-actions">
                <!-- Populated by script.js -->
            </div>
        </div>
    </nav>

    <main class="pt-32 pb-20 min-h-screen px-12 max-w-[1440px] mx-auto">
        <div class="mb-12">
            <nav class="flex items-center gap-2 text-sm text-on-surface-variant mb-4 font-medium tracking-wide">
                <span>GAMES & FUN</span>
                <span class="material-symbols-outlined text-xs">chevron_right</span>
                <span class="text-primary uppercase tracking-widest text-[10px] font-bold">Connect 4</span>
            </nav>
            <h1 class="text-5xl font-extrabold tracking-tighter text-on-surface mb-2">Connect 4.</h1>
            <p class="text-on-surface-variant text-lg max-w-2xl">Drop tokens and align four of your color to win. Features advanced recursive AI for the ultimate challenge.</p>
        </div>

        <div class="grid grid-cols-12 gap-8 items-start">
            <!-- Sidebar -->
            <div class="col-span-12 lg:col-span-4 space-y-8">
                <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0px_20px_40px_rgba(139,92,246,0.06)]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-sm font-bold tracking-[0.03em] text-on-surface uppercase text-purple-800">Match History</h3>
                        <span onclick="clearSidebarHistory()" class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary transition-colors" title="Clear History">delete_sweep</span>
                    </div>
                    <div class="space-y-6" id="sidebar-history-container">
                        <p class="text-sm text-on-surface-variant font-medium opacity-60 text-center py-4">No recent matches.</p>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="col-span-12 lg:col-span-8">
                <div class="bg-surface-container-low rounded-xl p-2 shadow-2xl overflow-hidden">
                    <div class="bg-primary-container m-4 rounded-xl p-8 flex flex-col items-center justify-center min-h-[500px] shadow-2xl relative border-4 border-primary">
                        <div id="board" class="bg-white/10 p-4 rounded-2xl grid grid-cols-7 gap-3 shadow-inner backdrop-blur-md"></div>
                        <div id="status-text" class="text-xs font-black text-white/70 uppercase tracking-[0.2em] mt-8">READY TO PLAY</div>
                    </div>

                    <div class="p-8 space-y-8">
                        <div class="flex items-center justify-between">
                            <select id="cpu-difficulty" class="bg-surface-container border-none rounded-xl text-xs font-bold px-4 py-3 outline-none focus:ring-2 focus:ring-primary transition-all">
                                <option value="easy">Easy (Random)</option>
                                <option value="med" selected>Medium (Standard)</option>
                                <option value="hard">Hard (Advanced)</option>
                                <option value="master">Master (Recursive)</option>
                            </select>
                            <div class="flex gap-4">
                                <button onclick="startCPU()" class="bg-white text-on-surface border border-slate-200 px-6 py-4 rounded-xl font-bold text-[10px] tracking-widest hover:bg-slate-50 transition-all uppercase">vs CPU</button>
                                <button onclick="resetBoard()" class="bg-primary text-white px-8 py-4 rounded-xl font-bold text-sm tracking-widest hover:shadow-xl transition-all uppercase">Reset Board</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/calc-utils.js"></script>
    <script>
        const COLS = 7; const ROWS = 6;
        let boardState = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        let currentPlayer = 1; let isGameActive = false;
        let playMode = 'local';
        const boardEl = document.getElementById('board');
        const statusText = document.getElementById('status-text');

        function createBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) { boardState[r] = Array(COLS).fill(0); }
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'w-10 h-10 md:w-12 md:h-12 bg-white/20 rounded-full shadow-inner border border-white/10 cursor-pointer relative';
                    cell.id = `cell-${r}-${c}`;
                    cell.addEventListener('click', () => handleColumnClick(c));
                    boardEl.appendChild(cell);
                }
            }
        }

        function handleColumnClick(col) {
            if (!isGameActive) return;
            if (playMode === 'cpu' && currentPlayer !== 1) return;
            let row = getEmptyRow(col);
            if (row === -1) return;
            makeMove(row, col, 1);
            if (isGameActive && playMode === 'cpu') {
                statusText.innerText = 'CPU IS THINKING...';
                setTimeout(makeCPUMove, 600);
            }
        }

        function getEmptyRow(col) {
            for (let r = ROWS - 1; r >= 0; r--) { if (boardState[r][col] === 0) return r; }
            return -1;
        }

        function makeMove(row, col, color) {
            boardState[row][col] = color;
            const cell = document.getElementById(`cell-${row}-${col}`);
            const token = document.createElement('div');
            token.className = `w-full h-full rounded-full token-drop shadow-lg ${color === 1 ? 'bg-rose-500' : 'bg-amber-400'}`;
            cell.appendChild(token);
            checkGameStatus();
        }

        function checkGameStatus() {
            const winRes = checkWin(boardState);
            if (winRes) {
                isGameActive = false;
                statusText.innerText = winRes === 1 ? 'RED WINS!' : (winRes === 2 ? 'YELLOW WINS!' : 'DRAW');
                saveResolution(winRes);
            } else {
                currentPlayer = currentPlayer === 1 ? 2 : 1;
                statusText.innerText = currentPlayer === 1 ? "RED'S TURN" : "YELLOW'S TURN";
            }
        }

        function checkWin(board) {
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= COLS - 4; c++) {
                    if (board[r][c] !== 0 && board[r][c] === board[r][c+1] && board[r][c] === board[r][c+2] && board[r][c] === board[r][c+3]) return board[r][c];
                }
            }
            for (let r = 0; r <= ROWS - 4; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c] !== 0 && board[r][c] === board[r+1][c] && board[r][c] === board[r+2][c] && board[r][c] === board[r+3][c]) return board[r][c];
                }
            }
            for (let r = 0; r <= ROWS - 4; r++) {
                for (let c = 0; c <= COLS - 4; c++) {
                    if (board[r][c] !== 0 && board[r][c] === board[r+1][c+1] && board[r][c] === board[r+2][c+2] && board[r][c] === board[r+3][c+3]) return board[r][c];
                }
            }
            for (let r = 3; r < ROWS; r++) {
                for (let c = 0; c <= COLS - 4; c++) {
                    if (board[r][c] !== 0 && board[r][c] === board[r-1][c+1] && board[r][c] === board[r-2][c+2] && board[r][c] === board[r-3][c+3]) return board[r][c];
                }
            }
            if (!board[0].includes(0)) return 'Draw';
            return null;
        }

        function makeCPUMove() {
            const diff = document.getElementById('cpu-difficulty').value;
            let bestCol = -1;
            if (diff === 'easy') {
                const valid = []; for(let c=0; c<COLS; c++) if(getEmptyRow(c)!==-1) valid.push(c);
                bestCol = valid[Math.floor(Math.random()*valid.length)];
            } else {
                let depth = diff === 'med' ? 2 : (diff === 'hard' ? 4 : 6);
                bestCol = getBestMove(depth);
            }
            if (bestCol !== -1) makeMove(getEmptyRow(bestCol), bestCol, 2);
        }

        function getBestMove(depth) {
            let bestScore = -Infinity;
            let col = -1;
            for (let c = 0; c < COLS; c++) {
                let r = getEmptyRow(c);
                if (r !== -1) {
                    boardState[r][c] = 2;
                    let score = minimax(boardState, depth, -Infinity, Infinity, false);
                    boardState[r][c] = 0;
                    if (score > bestScore) { bestScore = score; col = c; }
                }
            }
            return col;
        }

        function minimax(board, depth, alpha, beta, isMaximizing) {
            const res = checkWin(board);
            if (res === 2) return 1000 + depth;
            if (res === 1) return -1000 - depth;
            if (res === 'Draw' || depth === 0) return 0;

            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let c = 0; c < COLS; c++) {
                    let r = getEmptyRowForBoard(board, c);
                    if (r !== -1) {
                        board[r][c] = 2;
                        bestScore = Math.max(bestScore, minimax(board, depth - 1, alpha, beta, false));
                        board[r][c] = 0;
                        alpha = Math.max(alpha, bestScore);
                        if (beta <= alpha) break;
                    }
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let c = 0; c < COLS; c++) {
                    let r = getEmptyRowForBoard(board, c);
                    if (r !== -1) {
                        board[r][c] = 1;
                        bestScore = Math.min(bestScore, minimax(board, depth - 1, alpha, beta, true));
                        board[r][c] = 0;
                        beta = Math.min(beta, bestScore);
                        if (beta <= alpha) break;
                    }
                }
                return bestScore;
            }
        }

        function getEmptyRowForBoard(board, col) {
            for (let r = ROWS - 1; r >= 0; r--) { if (board[r][col] === 0) return r; }
            return -1;
        }

        function resetBoard() { isGameActive = true; currentPlayer = 1; createBoard(); statusText.innerText = "RED'S TURN"; }
        function startCPU() { playMode = 'cpu'; resetBoard(); }
        async function saveResolution(w) { await window.saveCalcToHistory('Connect 4', [{label: 'Mode', val: playMode.toUpperCase()}], [{label: 'Winner', val: w}]); initSidebarHistory('Connect 4', 'sidebar-history-container'); }

        document.addEventListener('DOMContentLoaded', () => {
            initSidebarHistory('Connect 4', 'sidebar-history-container');
            createBoard();
        });
    </script>
    <script type="module" src="/js/script.js"></script>
</body>
</html>
