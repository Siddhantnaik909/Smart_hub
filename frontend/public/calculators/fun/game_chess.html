<body class="bg-surface text-on-surface selection:bg-primary/20 transition-colors duration-300">
    <nav class="fixed top-0 w-full z-50 bg-slate-50/70 dark:bg-slate-900/70 backdrop-blur-xl shadow-[0px_20px_40px_rgba(139,92,246,0.06)] h-20 flex items-center px-12 tracking-tight">
        <div class="max-w-[1440px] mx-auto w-full flex justify-between items-center">
            <div class="flex items-center gap-8">
                <span id="nav-site-logo-text" class="text-xl font-bold tracking-tighter text-slate-900 text-primary uppercase">Smart Hub</span>
                <div class="hidden md:flex items-center gap-6">
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/index.html">Home</a>
                    <a class="text-primary font-semibold border-b-2 border-primary pb-1" href="/calculators.html">Tools</a>
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/GameLobby.html">Games</a>
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/history.html">History</a>
                    <a class="text-slate-500 hover:text-slate-900 transition-colors" href="/about.html">About</a>
                </div>
            </div>

            </div>

    <main class="pt-32 pb-20 min-h-screen px-12 max-w-[1440px] mx-auto">
        <div class="mb-12">
            <nav class="flex items-center gap-2 text-sm text-on-surface-variant mb-4 font-medium tracking-wide">
                <span>GAMES & FUN</span>
                <span class="material-symbols-outlined text-xs">chevron_right</span>
                <span class="text-primary uppercase tracking-widest text-[10px] font-bold">Play Chess</span>
            </nav>
            <h1 class="text-5xl font-extrabold tracking-tighter text-on-surface mb-2">Chess Game.</h1>
            <p class="text-on-surface-variant text-lg max-w-2xl">Good quality cognitive simulation. Deploy tactical units across the Chess board to achieve total positional dominance.</p>
        </div>

        <div class="grid grid-cols-12 gap-8 items-start">
            <!-- Sidebar -->
            <div class="col-span-12 lg:col-span-4 space-y-8">
                <div class="bg-surface-container-lowest p-8 rounded-xl shadow-[0px_20px_40px_rgba(139,92,246,0.06)]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-sm font-bold tracking-[0.03em] text-on-surface uppercase text-purple-800">Match History</h3>
                        <span onclick="clearSidebarHistory()" class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary transition-colors" title="Clear History">delete_sweep</span>
                    </div>
                    <div class="space-y-6" id="sidebar-history-container">
                        <p class="text-sm text-on-surface-variant font-medium opacity-60 text-center py-4">No recent games.</p>
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="col-span-12 lg:col-span-8">
                <div class="bg-surface-container-low rounded-xl p-2 shadow-2xl overflow-hidden">
                    <div class="bg-surface-container-lowest m-4 rounded-xl p-8 flex flex-col items-center justify-center min-h-[550px] shadow-inner relative">
                        <div id="board" class="w-full max-w-[500px] shadow-2xl"></div>
                        <div id="status-text" class="text-xs font-black text-on-surface-variant uppercase tracking-[0.2em] mt-4">READY TO PLAY</div>
                    </div>

                    <div class="p-8 space-y-8">
                        <div class="flex items-center justify-between">
                            <select id="cpu-difficulty" class="bg-surface-container border-none rounded-xl text-xs font-bold px-4 py-3 outline-none focus:ring-2 focus:ring-primary transition-all">
                                <option value="easy">Easy (Linear)</option>
                                <option value="med">Medium (Balanced)</option>
                                <option value="hard">Hard (Advanced)</option>
                                <option value="master" selected>Master (Expert)</option>
                            </select>
                            <div class="flex gap-4">
                                <button onclick="startCPU()" class="bg-white text-on-surface border border-slate-200 px-6 py-4 rounded-xl font-bold text-[10px] tracking-widest hover:bg-slate-50 transition-all uppercase">vs CPU</button>
                                <button onclick="performRestart()" class="bg-primary text-white px-8 py-4 rounded-xl font-bold text-sm tracking-widest hover:shadow-xl transition-all uppercase">Reset Board</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="/js/calc-utils.js"></script>
    <script>
        let board = null;
        let game = new Chess();
        let playMode = 'local';

        function initBoard() {
            const config = {
                draggable: true,
                position: 'start',
                onDragStart: (source, piece) => {
                    if (game.game_over()) return false;
                    if (playMode === 'cpu' && game.turn() === 'b') return false;
                    if ((game.turn() === 'w' && piece.search(/^b/) !== -1) || (game.turn() === 'b' && piece.search(/^w/) !== -1)) return false;
                },
                onDrop: (source, target) => {
                    let move = game.move({ from: source, to: target, promotion: 'q' });
                    if (move === null) return 'snapback';
                    updateStatus();
                    if (playMode === 'cpu' && !game.game_over()) setTimeout(makeCPUMove, 600);
                },
                onSnapEnd: () => board.position(game.fen()),
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png'
            };
            board = Chessboard('board', config);
        }

        function updateStatus() {
            let status = game.turn() === 'w' ? 'White' : 'Black';
            if (game.in_checkmate()) status = `Winner: ${turn === 'w' ? 'Black' : 'White'} (Checkmate)`;
            else if (game.in_draw()) status = 'Draw';
            else status = game.turn() === 'w' ? "WHITE'S TURN" : "BLACK'S TURN";
            document.getElementById('status-text').innerText = status;
        }

        function makeCPUMove() {
            const diff = document.getElementById('cpu-difficulty').value;
            const moves = game.moves();
            if (moves.length === 0) return;

            // Logic Complexity
            let move;
            if (diff === 'easy') {
                move = moves[Math.floor(Math.random() * moves.length)];
            } else {
                let depth = diff === 'med' ? 1 : (diff === 'hard' ? 2 : 3);
                move = getBestMove(game, depth);
            }

            game.move(move);
            board.position(game.fen());
            updateStatus();
        }

        function getBestMove(game, depth) {
            let moves = game.moves();
            let bestMove = -Infinity;
            let bestMoveFound;

            moves.forEach(m => {
                game.move(m);
                let value = minimax(game, depth - 1, -Infinity, Infinity, false);
                game.undo();
                if (value > bestMove) {
                    bestMove = value;
                    bestMoveFound = m;
                }
            });
            return bestMoveFound || moves[0];
        }

        function minimax(game, depth, alpha, beta, isMaximizing) {
            if (depth === 0) return -evaluateBoard(game.board());
            let moves = game.moves();
            if (isMaximizing) {
                let bestScore = -Infinity;
                for (let m of moves) {
                    game.move(m);
                    bestScore = Math.max(bestScore, minimax(game, depth - 1, alpha, beta, !isMaximizing));
                    game.undo();
                    alpha = Math.max(alpha, bestScore);
                    if (beta <= alpha) return bestScore;
                }
                return bestScore;
            } else {
                let bestScore = Infinity;
                for (let m of moves) {
                    game.move(m);
                    bestScore = Math.min(bestScore, minimax(game, depth - 1, alpha, beta, !isMaximizing));
                    game.undo();
                    beta = Math.min(beta, bestScore);
                    if (beta <= alpha) return bestScore;
                }
                return bestScore;
            }
        }

        function evaluateBoard(board) {
            let total = 0;
            const vals = { p: 10, n: 30, b: 30, r: 50, q: 90, k: 900 };
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    let p = board[r][c];
                    if (p) total += vals[p.type] * (p.color === 'w' ? 1 : -1);
                }
            }
            return total;
        }

        function performRestart() { game.reset(); board.position('start'); updateStatus(); }
        function startCPU() { playMode = 'cpu'; performRestart(); }

        document.addEventListener('DOMContentLoaded', () => {
            initBoard();
            initSidebarHistory('Chess', 'sidebar-history-container');
        });
    </script>
    <script type="module" src="/js/script.js"></script>
</body>
</html>
