<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART HUB | Ovulation & Fertility Calculator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/custom.css">
</head>
<body>
    <div class="dashboard-layout" id="dashboard-wrapper">
        <div class="overlay" id="mobile-overlay"></div>
        <div id="sidebar-placeholder"></div>
        
        <main class="main-content">
            <div id="header-placeholder"></div>
            
            <div class="page-body">
                <section class="container fade-in">
                    <div class="cat-card stagger-1">
                        <div class="calculator-header">
                            <h2><i class="fa-solid fa-baby-carriage" style="color: #ec4899;"></i> Ovulation & Fertility Calculator</h2>
                            <p>Estimate your most fertile days and next menstrual cycle.</p>
                        </div>
                        
                        <div class="sub-cat-list">
                            <div class="sub-link">
                                <span>First Day of Last Period</span>
                                <input type="date" id="lmpDate" class="form-control">
                            </div>
                            <div class="sub-link">
                                <span>Average Cycle Length (Days)</span>
                                <input type="number" id="cycleLength" class="form-control" value="28" placeholder="e.g. 28">
                            </div>
                            
                            <button id="calculateBtn" class="btn-calc" style="background-color: #ec4899;">Calculate Fertile Window</button>
                            <button id="clear-btn" class="btn-secondary" style="opacity: 0.7;">Clear</button>
                        </div>
                    </div>

                    <div id="results" class="cat-card stagger-2 hidden" style="display: none; margin-top: 20px;">
                        <h3>Fertility Timeline</h3>
                        <div class="sub-cat-list" id="result-display-area">
                            </div>
                        <div class="button-group" style="margin-top: 20px;">
                            <button class="btn-save">
                                <i class="fa-solid fa-save"></i> Save Timeline
                            </button>
                        </div>
                    </div>
                </section>
                <div id="footer-placeholder"></div>
            </div>
        </main>
    </div>

    <script>
        window.FRONTEND_ROOT = "/"; 
        window.COMPONENT_ROOT = "/components/"; 

        document.addEventListener('DOMContentLoaded', () => {
            const calculateBtn = document.getElementById('calculateBtn');
            const resultsCard = document.getElementById('results');
            const displayArea = document.getElementById('result-display-area');
            const lmpInput = document.getElementById('lmpDate');
            const cycleInput = document.getElementById('cycleLength');

            // Helper to format dates consistently
            const formatDate = (date) => date.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });

            calculateBtn.addEventListener('click', () => {
                const inputs = document.querySelectorAll('#lmpDate, #cycleLength');
                if (!validateInputs(inputs, { checkPositive: true })) {
                    return;
                }

                const lmpDate = new Date(lmpInput.value + 'T00:00:00'); // Avoid timezone issues
                const cycleLength = parseInt(cycleInput.value);

                // --- Calculations ---
                const ovulationDay = cycleLength - 14;
                
                const ovulationDate = new Date(lmpDate);
                ovulationDate.setDate(lmpDate.getDate() + ovulationDay);

                const fertileStart = new Date(ovulationDate);
                fertileStart.setDate(ovulationDate.getDate() - 5);

                const fertileEnd = new Date(ovulationDate);
                fertileEnd.setDate(ovulationDate.getDate() + 1);

                const nextPeriodDate = new Date(lmpDate);
                nextPeriodDate.setDate(lmpDate.getDate() + cycleLength);

                // --- UI Update ---
                displayArea.innerHTML = `
                    <div class="sub-link" style="background: rgba(236, 72, 153, 0.1); border-left: 4px solid #ec4899;">
                        <span>Estimated Ovulation Date</span>
                        <strong>${formatDate(ovulationDate)}</strong>
                    </div>
                    <div class="sub-link">
                        <span>Fertile Window</span>
                        <strong>${formatDate(fertileStart)} - ${formatDate(fertileEnd)}</strong>
                    </div>
                    <div class="sub-link">
                        <span>Estimated Next Period</span>
                        <strong>${formatDate(nextPeriodDate)}</strong>
                    </div>
                `;

                resultsCard.style.display = 'block';
                resultsCard.classList.remove('hidden');

                // --- Save to History ---
                window.setLastCalc(
                    'Ovulation Calculator',
                    [
                        { label: 'Last Period Start', val: formatDate(lmpDate) },
                        { label: 'Cycle Length', val: `${cycleLength} days` }
                    ],
                    [
                        { label: 'Estimated Ovulation', val: formatDate(ovulationDate), highlight: true },
                        { label: 'Fertile Window', val: `${formatDate(fertileStart)} - ${formatDate(fertileEnd)}` },
                        { label: 'Next Period Starts', val: formatDate(nextPeriodDate) }
                    ]
                );
            });
        });
    </script>

    <script src="/js/component-loader.js"></script>
    <script type="module" src="/js/script.js"></script>
    <script src="/js/calculators.js"></script>
</body>
</html>
