<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART HUB | Clinical BMI Analyzer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/custom.css">
    <style>
        .bmi-visual-container {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }
        .body-diagram-container {
            flex: 1;
            text-align: center;
        }
        .gauge-details-container {
            flex: 2;
        }
        #body-silhouette path {
            transition: fill 0.5s ease-in-out;
        }
        .health-gauge {
            width: 100%;
            height: 20px;
            background: transparent;
            border-radius: 10px;
            margin: 10px 0 5px;
            position: relative;
            overflow: hidden;
            display: flex;
            border: 1px solid var(--border-color);
        }
        .gauge-segment { height: 100%; }
        .underweight { background: #3b82f6; width: 46.25%; }
        .normal { background: #10b981; width: 16.25%; }
        .overweight { background: #f59e0b; width: 12.25%; }
        .obese { background: #ef4444; width: 25.25%; }
        
        .gauge-pointer {
            position: absolute;
            top: -5px;
            width: 4px;
            height: 30px;
            background: var(--text-header);
            border: 2px solid var(--bg-card);
            border-radius: 2px;
            transition: left 1s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .gauge-labels {
            display: flex;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .gauge-labels span:nth-child(1) { width: 46.25%; text-align: left; }
        .gauge-labels span:nth-child(2) { width: 16.25%; text-align: center; }
        .gauge-labels span:nth-child(3) { width: 12.25%; text-align: center; }
        .gauge-labels span:nth-child(4) { width: 25.25%; text-align: right; }

        @media (max-width: 600px) {
            .bmi-visual-container {
                flex-direction: column;
                gap: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-layout" id="dashboard-wrapper">
        <div class="overlay" id="mobile-overlay"></div>
        <div id="sidebar-placeholder"></div>
        
        <main class="main-content">
            <div id="header-placeholder"></div>
            
            <div class="page-body">
                <section class="container fade-in">
                    <div class="cat-card stagger-1">
                        <div class="calculator-header">
                            <h2><i class="fa-solid fa-weight-scale"></i> Clinical BMI Analyzer</h2>
                            <p>Assess body mass index and receive personalized weight range recommendations.</p>
                        </div>
                        
                        <div class="sub-cat-list">
                            <div class="sub-link">
                                <span>Weight (kg)</span>
                                <input type="number" id="bmiWeight" class="form-control" placeholder="e.g. 70" step="0.1">
                            </div>
                            <div class="sub-link">
                                <span>Height (cm)</span>
                                <input type="number" id="bmiHeight" class="form-control" placeholder="e.g. 175">
                            </div>
                            
                            <button id="calculateBtn" class="btn-calc">Calculate Analysis</button>
                            <button id="clear-btn" class="btn-secondary" style="opacity: 0.7;">Clear Data</button>
                        </div>
                    </div>

                    <div id="results" class="cat-card stagger-2 hidden" style="display: none; margin-top: 20px;">
                        <h3>Health Profile Summary</h3>
                        
                        <div class="bmi-visual-container">
                            <div class="body-diagram-container">
                                <svg id="body-silhouette" width="80" height="180" viewBox="0 0 100 200" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M49.9,25.9c-6.7,0-12.1,5.4-12.1,12.1s5.4,12.1,12.1,12.1s12.1-5.4,12.1-12.1S56.6,25.9,49.9,25.9z M62.4,52.4 c-1.6,0-3.1,0.3-4.6,0.8c-2.9-4.5-7.8-7.5-13.3-7.5s-10.4,3-13.3,7.5c-1.5-0.5-3-0.8-4.6-0.8c-5.8,0-10.5,4.7-10.5,10.5v1.5 c0,2.1,0.6,4.1,1.7,5.8l-5.2,43.1c-0.4,3.5,2.2,6.5,5.7,6.5h4.8v53.5c0,3.4,2.8,6.2,6.2,6.2h19.2c3.4,0,6.2-2.8,6.2-6.2v-53.5h4.8 c3.5,0,6.1-3,5.7-6.5l-5.2-43.1c1.1-1.7,1.7-3.7,1.7-5.8v-1.5C72.9,57.1,68.2,52.4,62.4,52.4z" fill="#bdc3c7"/>
                                </svg>
                            </div>
                            <div class="gauge-details-container">
                                <div style="text-align: center; padding-bottom: 10px;">
                                    <span style="font-size: 0.9rem; color: var(--text-muted);">Current BMI Score</span>
                                    <div id="bmiResult" style="font-size: 3.5rem; font-weight: 900; color: var(--accent-cyan);">0.0</div>
                                    <strong id="bmiCategory" style="font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px;">-</strong>
                                </div>
                                <div class="health-gauge">
                                    <div class="gauge-segment underweight"></div>
                                    <div class="gauge-segment normal"></div>
                                    <div class="gauge-segment overweight"></div>
                                    <div class="gauge-segment obese"></div>
                                    <div id="gauge-pointer" class="gauge-pointer" style="left: 0%;"></div>
                                </div>
                                <div class="gauge-labels">
                                    <span>Under</span>
                                    <span>Normal</span>
                                    <span>Over</span>
                                    <span>Obese</span>
                                </div>
                            </div>
                        </div>

                        <div class="sub-cat-list" id="result-display-area">
                            </div>

                        <div class="sub-link" style="background: rgba(16, 185, 129, 0.05); border-left: 4px solid #10b981; margin-top: 15px; padding: 15px;">
                            <span style="color: #10b981; font-weight: bold;"><i class="fa-solid fa-heart-pulse"></i> Medical Insight</span>
                            <p id="pro-tip" style="font-size: 0.85rem; margin-top: 5px; line-height: 1.4;"></p>
                        </div>

                        <div class="button-group" style="margin-top: 20px; display: flex; gap: 10px;">
                            <button class="btn-save" style="flex: 1;">
                                <i class="fa-solid fa-save"></i> Save Record
                            </button>
                            <button onclick="window.print()" class="btn-secondary" style="flex: 1;">
                                <i class="fa-solid fa-print"></i> Print Report
                            </button>
                        </div>
                    </div>
                </section>
                <div id="footer-placeholder"></div>
            </div>
        </main>
    </div>

    <script>
        window.FRONTEND_ROOT = "/"; 
        window.COMPONENT_ROOT = "/components/"; 

        document.addEventListener('DOMContentLoaded', () => {
            const calculateBtn = document.getElementById('calculateBtn');
            const weightInput = document.getElementById('bmiWeight');
            const heightInput = document.getElementById('bmiHeight');

            calculateBtn.addEventListener('click', () => {
                const inputs = [weightInput, heightInput];
                if (!validateInputs(inputs, { checkPositive: true })) {
                    return;
                }

                const weight = parseFloat(weightInput.value);
                const heightCm = parseFloat(heightInput.value);
                const resCard = document.getElementById('results');
                const heightM = heightCm / 100;
                const bmi = parseFloat((weight / (heightM * heightM)).toFixed(1));
                
                // UI Elements
                const bmiText = document.getElementById('bmiResult');
                const catText = document.getElementById('bmiCategory');
                const pointer = document.getElementById('gauge-pointer');
                const resArea = document.getElementById('result-display-area');
                const tipArea = document.getElementById('pro-tip');

                // Category Logic
                let category = "";
                let color = "";
                let tip = "";
                let pointerPos = (bmi / 40) * 100; // Simplified scale up to 40
                if (pointerPos > 100) pointerPos = 98;

                if (bmi < 18.5) {
                    category = "Underweight";
                    color = "#3b82f6";
                    tip = "Consider consulting a nutritionist to establish a healthy weight-gain plan focusing on nutrient-dense foods.";
                } else if (bmi < 25) {
                    category = "Normal Weight";
                    color = "#10b981";
                    tip = "Excellent! You are within the healthy range. Maintain this with a balanced diet and at least 150 minutes of weekly activity.";
                } else if (bmi < 30) {
                    category = "Overweight";
                    color = "#f59e0b";
                    tip = "You are slightly above the ideal range. Small lifestyle adjustments in portion control and daily steps can make a big difference.";
                } else {
                    category = "Obese";
                    color = "#ef4444";
                    tip = "Your BMI suggests health risks. We recommend a check-up with a healthcare provider to discuss a safe cardiovascular plan.";
                }

                // Calculations for Ideal Weight (Robinson Formula approx)
                const minIdealWeight = (18.5 * (heightM * heightM));
                const maxIdealWeight = (24.9 * (heightM * heightM));

                let weightGoalHtml = '';
                if (bmi < 18.5) {
                    const toGain = (minIdealWeight - weight).toFixed(1);
                    weightGoalHtml = `<div class="sub-link" style="background: rgba(59, 130, 246, 0.1);"><span>To Reach Normal Range</span><strong>Gain ${toGain} kg</strong></div>`;
                } else if (bmi >= 25) {
                    const toLose = (weight - maxIdealWeight).toFixed(1);
                    weightGoalHtml = `<div class="sub-link" style="background: rgba(245, 158, 11, 0.1);"><span>To Reach Normal Range</span><strong>Lose ${toLose} kg</strong></div>`;
                } else {
                    weightGoalHtml = `<div class="sub-link" style="background: rgba(16, 185, 129, 0.1);"><span>Weight Goal</span><strong>You're in a healthy range!</strong></div>`;
                }

                // Update UI
                resCard.style.display = 'block';
                resCard.classList.remove('hidden');
                bmiText.innerText = bmi;
                bmiText.style.color = color;
                catText.innerText = category;
                catText.style.color = color;
                pointer.style.left = pointerPos + "%";
                
                const bodySVG = document.querySelector('#body-silhouette path');
                if (bodySVG) {
                    bodySVG.setAttribute('fill', color);
                }

                resArea.innerHTML = `
                    <div class="sub-link"><span>Ideal Weight Range</span><strong>${minIdealWeight.toFixed(1)}kg - ${maxIdealWeight.toFixed(1)}kg</strong></div>
                    ${weightGoalHtml}
                    <div class="sub-link"><span>Height in Meters</span><strong>${heightM} m</strong></div>
                    <div class="sub-link"><span>Health Risk Level</span><strong>${bmi >= 30 ? 'Elevated' : 'Standard'}</strong></div>
                `;
                
                tipArea.innerHTML = tip;

                // Save to history
                window.setLastCalc(
                    'BMI Analyzer',
                    [{ label: 'Weight', val: `${weight} kg` }, { label: 'Height', val: `${heightCm} cm` }],
                    [
                        { label: 'BMI Score', val: bmi, highlight: true },
                        { label: 'Category', val: category },
                        { label: 'Ideal Weight', val: `${minIdealWeight.toFixed(1)} - ${maxIdealWeight.toFixed(1)} kg` }
                    ]
                );
            });
        });
    </script>

    <script src="/js/component-loader.js"></script>
    <script type="module" src="/js/script.js"></script>
    <script src="/js/calculators.js"></script>
</body>
</html>
