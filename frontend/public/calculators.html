<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMART HUB | All Calculators</title>
    <!-- Shared Head Links -->
    <div id="head-links"></div>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/custom.css">
    <style>
        .logic-header {
            background: var(--primary-gradient);
            padding: 50px 20px;
            border-radius: 24px;
            text-align: center;
            color: white;
            margin-bottom: 40px;
            box-shadow: var(--shadow-card);
        }

        .search-container {
            max-width: 700px;
            margin: -35px auto 40px;
            position: relative;
            z-index: 10;
        }

        .search-container input {
            width: 100%;
            padding: 18px 30px;
            border-radius: 50px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            font-size: 1.1rem;
            background: var(--bg-card);
            color: var(--text-color);
        }

        .category-grid {
            margin-top: 20px;
        }

        .tool-category {
            margin-bottom: 30px;
        }

        .category-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .category-title i {
            background: var(--primary-color);
            color: white;
            padding: 10px;
            border-radius: 12px;
            font-size: 1.2rem;
        }
    </style>
</head>

<body>
    <div class="dashboard-layout" id="dashboard-wrapper">
        <div class="overlay" id="mobile-overlay"></div>
        <div id="sidebar-placeholder"></div>
        <main class="main-content">
            <div id="header-placeholder"></div>
            <div class="page-body">
                <header class="logic-header fade-in">
                    <h1 style="font-size: 2.8rem; margin-bottom: 10px;">Your Professional <span
                            style="color: #fcd34d;">Logic</span> Suite</h1>
                    <p style="opacity: 0.9; font-size: 1.1rem;">Precision tools for every professional and personal
                        need.</p>
                </header>

                <div class="search-container fade-in">
                    <input type="text" id="toolSearch" placeholder="Search across 60+ calculators..."
                        onkeyup="searchTools()">
                </div>

                <div id="catalogGrid" class="category-grid fade-in delay-1">
                    <!-- Dynamic Categories will be generated by JS below -->
                </div>
            </div>
            <div id="footer-placeholder"></div>
        </main>
    </div>

    <script>

        async function renderCatalog() {
            let disabledTools = [];
            let categoryOrder = [];
            let customCats = [];
            try {
                // 1. Try Cache First
                const cached = localStorage.getItem('smartHub.settings.cache');
                if (cached) {
                    const s = JSON.parse(cached);
                    if (s.categoryOrder) categoryOrder = s.categoryOrder;
                    if (s.disabledTools) disabledTools = s.disabledTools;
                    if (s.customCategories) customCats = s.customCategories;
                } else {
                    // 2. Fallback Fetch
                    const API_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') ? 'http://localhost:3000' : 'https://smart-hub-f5gw.onrender.com';
                    const res = await fetch(`${API_URL}/api/admin/client/settings`);
                    if (res.ok) {
                        const s = await res.json();
                        if (s.categoryOrder) categoryOrder = s.categoryOrder;
                        if (s.disabledTools) disabledTools = s.disabledTools;
                        if (s.customCategories) customCats = s.customCategories;
                        localStorage.setItem('smartHub.settings.cache', JSON.stringify(s));
                    }
                }
            } catch (e) { console.error("Failed to load visibility settings", e); }

            // Use the master list from script.js as the source of truth.
            // It's safer to deep-copy to avoid side-effects if other scripts modify it.
            const sourceData = window.CALCULATORS_DATA ? JSON.parse(JSON.stringify(window.CALCULATORS_DATA)) : [];
            let displayCatalog = sourceData.map(c => ({
                cat: c.category,
                icon: c.icon,
                tools: (c.items || []).map(t => ({ name: t.name, path: t.link }))
            }));

            if (customCats.length > 0) {
                const customCatNames = new Set(customCats.map(c => c.category));
                displayCatalog = displayCatalog.filter(c => !customCatNames.has(c.cat)); // Prevent duplicates
                displayCatalog.push(...customCats.map(c => ({ cat: c.category, icon: c.icon, tools: (c.items || []).map(t => ({ name: t.name, path: t.link })) })));
            }

            // Sort categories based on admin order
            if (categoryOrder.length > 0) {
                displayCatalog.sort((a, b) => {
                    const idxA = categoryOrder.indexOf(a.cat);
                    const idxB = categoryOrder.indexOf(b.cat);
                    if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                    if (idxA !== -1) return -1;
                    if (idxB !== -1) return 1;
                    // Keep original order for items not in the sort list
                    return 0;
                });
            }

            const grid = document.getElementById('catalogGrid');
            grid.innerHTML = displayCatalog.map(c => {
                const visibleTools = c.tools.filter(t => !disabledTools.includes(t.path));
                // Allow empty custom categories to show (so you know they exist), or hide if preferred. 
                // Currently hiding empty to keep UI clean, but for custom ones you might want to see them.
                if (visibleTools.length === 0 && !customCats.find(cc => cc.category === c.cat)) return '';

                return `
                <div class="tool-category">
                    <div class="category-title"><i class="${c.icon}"></i> ${c.cat}</div>
                    <div class="cat-card">
                        <div class="sub-cat-list" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:10px; border:none;">
                            ${visibleTools.map(t => `<a href="${t.path}" class="calc-link" style="padding:15px; border-radius:12px; background:var(--bg-main); border:1px solid var(--border-color); text-decoration:none; color:var(--text-color); display:flex; justify-content:space-between; align-items:center;">${t.name} <i class="fa-solid fa-chevron-right arrow" style="opacity:0.5; font-size:0.8rem;"></i></a>`).join('')}
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function searchTools() {
            const term = document.getElementById('toolSearch').value.toLowerCase();
            document.querySelectorAll('.tool-category').forEach(cat => {
                const links = cat.querySelectorAll('.calc-link');
                let found = false;
                links.forEach(l => {
                    const match = l.innerText.toLowerCase().includes(term);
                    l.style.display = match ? 'flex' : 'none';
                    if (match) found = true;
                });
                cat.style.display = found ? 'block' : 'none';
            });
        }

        document.addEventListener('DOMContentLoaded', renderCatalog);
    </script>
    <script>window.FRONTEND_ROOT = "/"; window.COMPONENT_ROOT = "/components/";</script>
    <script src="/js/component-loader.js"></script>
    <script type="module" src="/js/script.js"></script>
    <script src="/js/custom.js"></script>
</body>

</html>
