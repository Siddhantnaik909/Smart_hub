<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-12 bg-surface">
<div class="w-full max-w-2xl">
<!-- Glassmorphism Card Container -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_20px_40px_rgba(16,18,147,0.06)] overflow-hidden transition-all duration-300">
<!-- Card Header -->
<div class="p-8 pb-4 text-center">
<h1 class="text-3xl font-extrabold tracking-tight text-on-surface font-headline mb-2">Create New Room</h1>
<p class="text-on-surface-variant font-body">Set up your lobby and invite players to join the action.</p>
</div>
<!-- Card Body -->
<form class="p-8 space-y-8">
<!-- Play Type Selection -->
<div class="space-y-3">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold">Play Type</label>
<div class="grid grid-cols-2 gap-4">
<button class="group relative flex flex-col items-center justify-center p-6 bg-secondary-fixed rounded-xl border-2 border-transparent transition-all hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-primary/20" type="button">
<span class="material-symbols-outlined text-3xl text-on-secondary-fixed-variant mb-2" data-icon="language">language</span>
<span class="font-bold text-on-secondary-fixed-variant">Online</span>
<div class="absolute top-2 right-2 h-4 w-4 rounded-full bg-primary flex items-center justify-center">
<span class="material-symbols-outlined text-[10px] text-white" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
</button>
<button class="group flex flex-col items-center justify-center p-6 bg-surface-container-low rounded-xl border-2 border-transparent transition-all hover:bg-surface-container-high focus:outline-none" type="button">
<span class="material-symbols-outlined text-3xl text-on-surface-variant mb-2" data-icon="wifi_off">wifi_off</span>
<span class="font-bold text-on-surface-variant">Offline</span>
</button>
</div>
</div>
<!-- Room Name Input -->
<div class="space-y-3">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="room-name">Room Name</label>
<div class="relative group">
<input class="w-full px-4 py-4 bg-surface-container-low border-none rounded-lg font-body text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="room-name" placeholder="Enter a cool name..." type="text"/>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline group-focus-within:text-primary transition-colors" data-icon="edit">edit</span>
</div>
</div>
<!-- Game Selection Dropdown -->
<div class="space-y-3">
<label class="font-label text-xs uppercase tracking-widest text-on-surface-variant font-semibold" for="game-select">Game Selection</label>
<div class="relative">
<select class="w-full appearance-none px-4 py-4 bg-surface-container-low border-none rounded-lg font-body text-on-surface focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all" id="game-select">
<option value="chess">Chess</option>
<option value="sudoku">Sudoku</option>
<option value="arcade">Arcade Strike</option>
<option value="poker">Poker Night</option>
<option value="trivia">Global Trivia</option>
</select>
<span class="absolute right-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Create Button -->
<div class="pt-4">
<button class="w-full py-4 bg-gradient-to-br from-[#4F46E5] to-[#3525cd] text-white font-bold text-lg rounded-xl shadow-[0px_10px_30px_rgba(79,70,229,0.3)] hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2" type="submit">
<span>Create Room</span>
<span class="material-symbols-outlined" data-icon="rocket_launch">rocket_launch</span>
</button>
</div>
